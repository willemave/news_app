suite: assistant_actions_v1
defaults:
  model_spec: anthropic:claude-opus-4-5-20251101
  judge_model_spec: openai:gpt-5.4
  screen_context:
    screen_type: assistant_quick
    screen_title: Quick Assistant

cases:
  - id: armin_ronacher_blog_subscribe
    query: "please find a blog by Armin Ronacher and subscribe to it"
    expected_feed_options: true
    expected_outcome: >
      The assistant identifies Armin Ronacher's blog at lucumr.pocoo.org,
      returns a validated subscribable feed option for that site, and does not
      auto-subscribe in the same turn.
  - id: hot_politics_blogs
    query: "what are the hot new blogs for politics?"
    expected_outcome: >
      The assistant recommends current politics blogs or publications and includes
      at least one of POLITICO, Axios, or Vox in the answer.
  - id: favorite_matches_search_term
    query: "Search my favorites for the term policy."
    seed_data:
      favorites:
        - url: https://example.com/ai-policy
          title: AI policy landscape
          source: Example
          summary: Policy and regulation updates from Washington and major labs.
        - url: https://example.com/sports
          title: Sports recap
          source: Example
          summary: Weekly sports roundup and standings.
    expected_outcome: >
      The assistant uses the user's favorited content to identify "AI policy landscape"
      at https://example.com/ai-policy as the matching favorite for the term
      "policy" and does not answer with the unrelated sports favorite.
  - id: recent_news_digests_summary
    query: "can you summarize my recent news digests?"
    screen_context:
      screen_type: daily_digest_list
      screen_title: News Digests
    seed_data:
      news_digests:
        - window_start_at: 2026-03-16T08:00:00
          window_end_at: 2026-03-16T09:00:00
          title: Washington and AI policy moved quickly
          summary: >
            The day centered on AI regulation, semiconductor policy, and a new
            round of campaign messaging ahead of key votes.
          bullets:
            - topic: AI transparency framework
              details: Congress debated a fresh AI transparency framework.
            - topic: Chip export controls
              details: Semiconductor export controls remained a major flashpoint.
            - topic: Campaign messaging
              details: Campaigns sharpened messaging around the economy and immigration.
          source_count: 3
        - window_start_at: 2026-03-15T08:00:00
          window_end_at: 2026-03-15T09:00:00
          title: Markets, media, and election strategy shaped the news
          summary: >
            Coverage focused on market volatility, coalition politics, and how
            major media outlets framed the next election cycle.
          bullets:
            - topic: Market volatility
              details: Investors reacted to a mix of rate expectations and political uncertainty.
            - topic: Coalition politics
              details: Party strategists argued over turnout and coalition building.
            - topic: Media narratives
              details: Media narratives diverged on the most important campaign issues.
          source_count: 3
    expected_outcome: >
      The assistant summarizes the user's recent news digests using the
      digest titles, summaries, or bullet points from the app context rather
      than switching to unrelated web results.
  - id: knowledge_hub_todays_summary
    query: "Give me a summary of the last day's content. What are the key themes and most important takeaways?"
    screen_context:
      screen_type: knowledge_hub
      screen_title: Knowledge
    seed_data:
      news_digests:
        - window_start_at: 2026-03-16T08:00:00
          window_end_at: 2026-03-16T09:00:00
          title: Washington and AI policy moved quickly
          summary: >
            The day centered on AI regulation, semiconductor policy, and a new
            round of campaign messaging ahead of key votes.
          bullets:
            - topic: AI transparency framework
              details: Congress debated a fresh AI transparency framework.
            - topic: Chip export controls
              details: Semiconductor export controls remained a major flashpoint.
            - topic: Campaign messaging
              details: Campaigns sharpened messaging around the economy and immigration.
          source_count: 3
        - window_start_at: 2026-03-15T08:00:00
          window_end_at: 2026-03-15T09:00:00
          title: Markets, media, and election strategy shaped the news
          summary: >
            Coverage focused on market volatility, coalition politics, and how
            major media outlets framed the next election cycle.
          bullets:
            - topic: Market volatility
              details: Investors reacted to a mix of rate expectations and political uncertainty.
            - topic: Coalition politics
              details: Party strategists argued over turnout and coalition building.
            - topic: Media narratives
              details: Media narratives diverged on the most important campaign issues.
          source_count: 3
    expected_outcome: >
      The assistant summarizes the user's recent news digests using the
      digest titles, summaries, or bullet points from the app context rather
      than switching to unrelated web results.
  - id: knowledge_hub_top_comments
    query: "What are the most interesting and insightful comments from the content I've received recently? Highlight any surprising perspectives or debates."
    screen_context:
      screen_type: knowledge_hub
      screen_title: Knowledge
    seed_data:
      news_digests:
        - window_start_at: 2026-03-16T08:00:00
          window_end_at: 2026-03-16T09:00:00
          title: AI policy, chips, and campaign framing collided
          summary: >
            The day's discussion focused on AI regulation, semiconductor
            controls, and how campaigns framed economic anxiety.
          bullets:
            - topic: Export controls debate
              details: Commentators split on whether export controls help or hurt long-term competitiveness.
            - topic: Open-source pressure
              details: Several analysts argued open-source models are weakening the case for hardware-only restrictions.
            - topic: Campaign coverage
              details: Campaign coverage diverged between media narratives and what local organizers said voters cared about.
          source_count: 3
        - window_start_at: 2026-03-15T08:00:00
          window_end_at: 2026-03-15T09:00:00
          title: Markets, turnout, and media narratives drove debate
          summary: >
            Coverage emphasized election strategy, turnout assumptions, and
            whether market volatility would change the political narrative.
          bullets:
            - topic: Persuasion versus turnout
              details: Strategists disagreed on whether persuasion or turnout mattered more.
            - topic: Media framing pushback
              details: Commentators pushed back on headline-driven media framing.
            - topic: Investor anxiety
              details: Analysts argued investor anxiety was more about policy ambiguity than rates alone.
          source_count: 3
    expected_outcome: >
      The assistant highlights concrete disagreements or surprising
      perspectives from the user's recent content context, including at least
      two distinct debates, instead of giving only a generic summary.
  - id: knowledge_hub_find_new_articles
    query: "Find a few new articles or sources I should read next based on what I've been reading."
    screen_context:
      screen_type: knowledge_hub
      screen_title: Knowledge
    seed_data:
      favorites:
        - url: https://example.com/ai-policy-landscape
          title: AI policy landscape in Washington
          source: Example Policy Review
        - url: https://example.com/chip-controls
          title: Semiconductor export controls and TSMC
          source: Example Chip Journal
        - url: https://example.com/venture-financing
          title: Venture slowdown and startup financing
          source: Example Venture Brief
    expected_outcome: >
      The assistant recommends a few relevant articles or source publications
      that fit the user's recent reading interests in AI policy,
      semiconductors, or venture financing, and briefly explains the fit.
  - id: knowledge_hub_find_new_feeds
    query: "Recommend a few feeds, newsletters, or podcasts I should add based on what I've been reading."
    expected_feed_options: true
    screen_context:
      screen_type: knowledge_hub
      screen_title: Knowledge
    seed_data:
      favorites:
        - url: https://example.com/ai-policy-landscape
          title: AI policy landscape in Washington
          source: Example Policy Review
        - url: https://example.com/chip-controls
          title: Semiconductor export controls and TSMC
          source: Example Chip Journal
        - url: https://example.com/venture-financing
          title: Venture slowdown and startup financing
          source: Example Venture Brief
    expected_outcome: >
      The assistant recommends a few relevant feeds, newsletters, or podcasts
      that fit the user's recent reading interests and presents them as
      recommendations for review rather than shifting into immediate
      subscription language.
