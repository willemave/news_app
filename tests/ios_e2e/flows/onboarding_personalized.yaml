appId: "${APP_ID}"
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      newslyE2EEnabled: true
      newslyE2EAutoLogin: true
      newslyE2EServerHost: "${SERVER_HOST}"
      newslyE2EServerPort: "${SERVER_PORT}"
      newslyE2EUseHTTPS: false
      newslyE2EUserId: "${USER_ID}"
      newslyE2ECompleteOnboarding: false
      newslyE2ECompleteTutorial: false
      newslyE2EFakeSpeechEnabled: true
      newslyE2EOnboardingFixture: "${ONBOARDING_FIXTURE}"
- assertVisible:
    text: Set up your feeds
- tapOn:
    text: Personalize with voice
- assertVisible:
    text: Tell us what you read
- assertVisible:
    text: LISTENING...
- tapOn:
    text: Recording. Tap to stop.
- assertVisible:
    text: Your picks
- assertVisible:
    text: Lenny's Newsletter
- assertVisible:
    text: Latent Space
- tapOn:
    id: onboarding.input.twitter_username
- inputText: "@willem_aw"
- tapOn:
    id: onboarding.input.news_preferences
- inputText: "Prefer chips and AI infra."
- tapOn:
    text: Your picks
- tapOn:
    text: Start reading
- assertVisible:
    text: How Newsly works
- tapOn:
    text: Got it
- assertVisible:
    id: tab.long_form
