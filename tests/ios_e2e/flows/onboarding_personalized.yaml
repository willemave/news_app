appId: "${APP_ID}"
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      newslyE2EEnabled: true
      newslyE2EAutoLogin: true
      newslyE2EServerHost: "${SERVER_HOST}"
      newslyE2EServerPort: "${SERVER_PORT}"
      newslyE2EUseHTTPS: false
      newslyE2EUserId: "${USER_ID}"
      newslyE2ECompleteOnboarding: false
      newslyE2ECompleteTutorial: false
      newslyE2EFakeSpeechEnabled: true
      newslyE2EFakeSpeechTranscript: "${TRANSCRIPT}"
- assertVisible:
    text: Newsbuddy
- tapOn:
    text: Personalize with voice
- assertVisible:
    text: Tell us what you read
- assertVisible:
    text: LISTENING
- tapOn:
    text: Tap again when you're done.
- extendedWaitUntil:
    visible:
      text: NEWSLETTERS
    timeout: 30000
- assertVisible:
    text: Your picks
- assertVisible:
    text: Stratechery
- assertVisible:
    text: Latent Space
- tapOn:
    text: Latent Space
- tapOn:
    text: Continue with 5
- tapOn:
    text: Start with 7 sources
- assertVisible:
    text: What to expect
- tapOn:
    text: Open my feed
- tapOn:
    id: tab.long_form
- assertVisible:
    text: Your long-form feed is being assembled
- assertVisible:
    text: 2 items are still processing across 5 sources.
- assertVisible:
    text: Check back in a minute.
- assertVisible:
    text: Selected Sources
- assertVisible:
    text: Decoder
- assertVisible:
    text: Stratechery
- assertVisible:
    text: 1 processing item
