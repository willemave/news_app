[mcp_servers.XcodeBuildMCP]
command = "/bin/zsh"
args = [
  "-lc",
  "PATH=/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin; export DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer; export NVM_DIR=\"$HOME/.nvm\"; [ -s \"$NVM_DIR/nvm.sh\" ] && . \"$NVM_DIR/nvm.sh\"; nvm use --silent >/dev/null 2>&1 || true; exec npx -y xcodebuildmcp@latest mcp",
]

[mcp_servers.XcodeBuildMCP.env]
INCREMENTAL_BUILDS_ENABLED = "false"
XCODEBUILDMCP_SENTRY_DISABLED = "false"
